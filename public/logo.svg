  <!-- Left peak crystalline facet — thin white wedge -->
  <polygon points="202,29 230,79 211,53" fill="white"/>

  <!-- Right peak crystalline facet — thin white wedge -->
  <polygon points="322,67 345,102 330,83" fill="white"/>

  <!-- App name -->
  <text
    x="250"
    y="258"
    font-family="'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-size="40"
    font-weight="700"
    fill="#0d2040"
    text-anchor="middle"
    letter-spacing="13"
  >HIGHWISE</text>
</svg>
